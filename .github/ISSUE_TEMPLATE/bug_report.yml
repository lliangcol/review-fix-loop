name: Bug report
description: Report a reproducible Review Fix Loop bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Include enough local context for maintainers to reproduce the snapshot or gate behavior.
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: python --version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config and mode
      description: Include config path, mode, pass number, cache-dir usage, and relevant adapter details.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Describe the smallest repository state or file changes that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
