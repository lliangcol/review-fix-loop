name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

      - name: Build
        run: |
          python -m build
          python -m twine check dist/*

      - name: Wheel CLI smoke
        run: |
          python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert len(wheels) == 1, wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', wheels[0]])"
          review-fix-loop --help
          review-fix-loop list-adapters
          review-fix-loop validate-schema --schema gate-config --file adapters/generic/gates.json --repo .

      - name: Check generated artifacts are not tracked
        shell: bash
        run: |
          ! git ls-files | grep -E '(__pycache__|\.pytest_cache|\.egg-info|^dist/|^build/)'
