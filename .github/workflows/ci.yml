name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src tests

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Mypy
        run: python -m mypy src/review_fix_loop

  test:
    name: test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: |
          python -c "from pathlib import Path; Path('.artifacts').mkdir(exist_ok=True)"
          python -m pytest -q --cov=review_fix_loop --cov-branch --cov-report=term-missing --cov-report=xml:.artifacts/coverage.xml --junitxml=.artifacts/junit.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            .artifacts/coverage.xml
            .artifacts/junit.xml

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build
        run: |
          python -m build
          python -m twine check dist/*

      - name: Wheel CLI smoke
        run: |
          python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert len(wheels) == 1, wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', wheels[0]])"
          review-fix-loop --help
          review-fix-loop list-adapters
          review-fix-loop validate-schema --schema gate-config --file adapters/generic/gates.json --repo .

  artifact-hygiene:
    name: artifact-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check generated artifacts are not tracked
        shell: bash
        run: |
          ! git ls-files | grep -E '(__pycache__|\.pytest_cache|\.mypy_cache|\.ruff_cache|\.egg-info|^dist/|^build/|^\.review-fix-loop/)'
