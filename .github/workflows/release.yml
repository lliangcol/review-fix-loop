name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build and check
        run: |
          python -m build
          python -m twine check dist/*

      - name: Wheel CLI smoke
        run: |
          python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert len(wheels) == 1, wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', wheels[0]])"
          review-fix-loop --help
          review-fix-loop list-adapters
          review-fix-loop validate-schema --schema gate-config --file adapters/generic/gates.json --repo .

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_to_testpypi == 'true'
    permissions:
      contents: read
      id-token: write
    environment: ${{ github.event.inputs.publish_to_testpypi == 'true' && 'testpypi' || 'pypi' }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        if: github.event.inputs.publish_to_testpypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.publish_to_testpypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
